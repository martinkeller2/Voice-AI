services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: voiceai
      POSTGRES_PASSWORD: voiceai
      POSTGRES_DB: voiceai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceai"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://voiceai:voiceai@db:5432/voiceai
    depends_on:
      db:
        condition: service_healthy

  init:
    build: .
    command: python init_db.py
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://voiceai:voiceai@db:5432/voiceai
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
